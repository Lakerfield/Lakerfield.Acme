name: Build .NET and publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

run-name: ${{ github.ref_name }}

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Fetch all history for all tags and branches
      run: git fetch --prune --unshallow
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.2.0
      with:
          versionSpec: '5.8.x'
    - name: Use GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.2.0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4.3.1
      with:
        dotnet-version: 10.0.x
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} -p:InformationalVersion=${{ steps.gitversion.outputs.Sha }}
    - name: Test
      run: dotnet test --no-restore --verbosity normal
    - name: Pack Lakerfield.Acme with dotnet
      run: dotnet pack --no-restore --no-build src/Lakerfield.Acme/Lakerfield.Acme.csproj --output nuget-packages --configuration Release -p:PackageVersion=${{ steps.gitversion.outputs.semVer }}
    - name: Push with dotnet
      run: dotnet nuget push nuget-packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
